<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savant Offline</title>
  <style>
    :root {
      --bg: #0a0f1a;
      --panel: #12192a;
      --border: rgba(255,255,255,0.12);
      --text: #d8e4ff;
      --dim: #8aa0cc;
      --cyan: #00f0ff;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .shell { min-height: 100%; display: grid; place-items: center; padding: 32px; }
    .card {
      width: min(640px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    h1 { margin: 0; font-size: 1.2rem; }
    p { margin: 0; color: var(--dim); line-height: 1.4; font-size: 0.95rem; }
    .status {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.85rem;
      color: var(--warn);
      border: 1px solid rgba(245,158,11,0.4);
      background: rgba(245,158,11,0.1);
      padding: 8px 10px;
      border-radius: 6px;
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button.primary {
      border-color: rgba(0,240,255,0.5);
      color: var(--cyan);
    }
    button:hover { border-color: rgba(255,255,255,0.35); }
    .small { font-size: 0.82rem; color: var(--dim); }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <h1>Savant is Offline</h1>
      <p>The configured server is currently unreachable. You can still run and manage local agents. Server updates are queued and will sync automatically when connectivity returns.</p>
      <div id="status" class="status">Checking server connection…</div>
      <div class="row">
        <button class="primary" id="open-terminal">Open Local Agent Terminal</button>
        <button id="retry-sync">Retry Server Sync</button>
      </div>
      <div id="queue" class="small">Queue: loading…</div>
      <div id="server" class="small"></div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const queueEl = document.getElementById('queue');
    const serverEl = document.getElementById('server');

    async function refresh() {
      if (!window.savantClient) return;
      const cfg = await window.savantClient.getServerConfig();
      const q = await window.savantClient.getQueueStats();
      statusEl.textContent = cfg.online ? 'Server online. Reconnecting…' : 'Server offline — running local-only mode';
      queueEl.textContent = `Queue: ${q.queued || 0} pending, ${q.failed || 0} failed`;
      serverEl.textContent = `Server: ${cfg.serverUrl || 'not configured'}`;
      if (cfg.online) setTimeout(() => location.reload(), 800);
    }

    document.getElementById('open-terminal').addEventListener('click', () => {
      if (window.terminalAPI && window.terminalAPI.showDrawer) {
        window.terminalAPI.showDrawer();
        window.terminalAPI.addNewTab();
      }
    });

    document.getElementById('retry-sync').addEventListener('click', async () => {
      if (window.savantClient && window.savantClient.flushQueueNow) {
        await window.savantClient.flushQueueNow();
      }
      refresh();
    });

    if (window.savantClient && window.savantClient.onSyncStatus) {
      window.savantClient.onSyncStatus((evt) => {
        statusEl.textContent = evt.online ? 'Server online. Reconnecting…' : 'Server offline — running local-only mode';
      });
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
